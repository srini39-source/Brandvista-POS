<!-- Add / Edit Category Modal -->
<div class="modal" id="categoryModal">
  <div class="modal-backdrop" data-close-panel></div>
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="categoryModalTitle">Add Category</h3>
      <button class="close-btn" data-close-panel>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label for="catName">Category Name</label>
        <input class="input" type="text" id="catName" placeholder="e.g. Beverages">
      </div>
      <div class="field">
        <label for="catIcon">Icon (emoji)</label>
        <input class="input" type="text" id="catIcon" placeholder="☕" maxlength="2">
      </div>
      <div class="field" style="margin-bottom:0;">
        <label for="catDesc">Description</label>
        <textarea class="input" id="catDesc" placeholder="Optional short description"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close-panel>Cancel</button>
      <button class="btn btn-primary" id="saveCategoryBtn">Save Category</button>
    </div>
  </div>
</div>

<script src="assets/js/app.js"></script>
<script>
  // Categories are loaded from (and saved back to) localStorage via
  // BrandVista.getCategories()/saveCategories() so that additions and edits
  // made here persist across reloads and show up in the Category dropdown
  // on the Products / Add Product / Edit Product pages too.
  let categories = BrandVista.getCategories();

  function persist() {
    BrandVista.saveCategories(categories);
  }

  const grid = document.getElementById('categoryGrid');

  function render() {
    grid.innerHTML = categories.map((c, i) => `
      <div class="card category-card animate-in" style="animation-delay:${i * 0.04}s;">
        <button class="btn btn-ghost btn-icon category-menu-btn" data-menu="${c.id}">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="19" r="1.4"/></svg>
        </button>
        <div class="category-icon" style="background:${c.color}; color:${c.fg};">${c.icon}</div>
        <div>
          <h4>${c.name}</h4>
          <div class="count">${c.count} products</div>
        </div>
        <div class="divider" style="margin:2px 0;"></div>
        <div class="flex gap-8">
          <button class="btn btn-secondary btn-sm w-full" data-edit="${c.id}">Edit</button>
          <button class="btn btn-ghost btn-icon" data-delete="${c.id}" title="Delete">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          </button>
        </div>
      </div>
    `).join('');
  }

  const modal = document.getElementById('categoryModal');
  const modalTitle = document.getElementById('categoryModalTitle');
  const catNameInput = document.getElementById('catName');
  const catIconInput = document.getElementById('catIcon');
  const catDescInput = document.getElementById('catDesc');

  // null = "Add" mode. Any other value = the id of the category being edited.
  // This is reset to null every time the modal is closed so a stray edit
  // session can never leak into the next "Add Category" click.
  let editingId = null;

  function openModal(cat) {
    editingId = cat ? cat.id : null;
    modalTitle.textContent = cat ? 'Edit Category' : 'Add Category';
    catNameInput.value = cat ? cat.name : '';
    catIconInput.value = cat ? cat.icon : '';
    catDescInput.value = cat ? cat.desc : '';
    modal.classList.add('open');
    catNameInput.focus();
  }

  function closeModal() {
    modal.classList.remove('open');
    editingId = null; // always back to "Add" mode once the modal is dismissed
  }

  document.getElementById('addCategoryBtn').addEventListener('click', () => openModal(null));
  document.querySelectorAll('[data-close-panel]').forEach((b) => b.addEventListener('click', closeModal));

  grid.addEventListener('click', (e) => {
    const editId = e.target.closest('[data-edit]')?.getAttribute('data-edit');
    const deleteId = e.target.closest('[data-delete]')?.getAttribute('data-delete');
    if (editId) {
      const cat = categories.find((c) => String(c.id) === String(editId));
      if (cat) openModal(cat);
    }
    if (deleteId) {
      if (confirm('Delete this category? Products inside it will become uncategorized.')) {
        categories = categories.filter((c) => String(c.id) !== String(deleteId));
        persist();
        render();
        updateSubtitle();
        BrandVista.showToast('Category deleted.', 'success');
      }
    }
  });

  function updateSubtitle() {
    const subtitle = document.querySelector('.topbar-title p');
    if (subtitle) subtitle.textContent = `Organize your catalog into ${categories.length} categories`;
  }

  document.getElementById('saveCategoryBtn').addEventListener('click', () => {
    const name = catNameInput.value.trim();
    if (!name) { BrandVista.showToast('Category name is required.', 'error'); return; }
    const icon = catIconInput.value.trim() || '📦';
    const desc = catDescInput.value.trim();

    if (editingId !== null) {
      const c = categories.find((x) => String(x.id) === String(editingId));
      if (c) {
        c.name = name; c.icon = icon; c.desc = desc;
        BrandVista.showToast('Category updated.', 'success');
      }
    } else {
      categories.unshift({ id: Date.now() + Math.floor(Math.random() * 1000), name, icon, count: 0, color: '#dbeafe', fg: '#2563eb', desc });
      BrandVista.showToast('Category added.', 'success');
    }
    editingId = null;
    modal.classList.remove('open');
    persist();
    render();
    updateSubtitle();
  });

  render();
  updateSubtitle();
</script>
<script type="module">
  import { protectPage } from './assets/js/neon-auth.js';
  protectPage();
</script>
