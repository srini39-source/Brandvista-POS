        Categories

      <div class="sidebar-section-label">People</div>
      <a href="customers.html" class="sidebar-link">

      </a>

  <div class="main-col">
    <header class="topbar">
      <div class="flex items-center gap-16">
        <button class="menu-toggle" data-menu-toggle aria-label="Open menu">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="topbar-title">
          <h1>Suppliers</h1>
          <p>18 active suppliers</p>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" data-theme-toggle aria-label="Toggle theme">
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
        <button class="btn btn-primary" id="addSupplierBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Supplier
        </button>
      </div>
    </header>

    <main class="content">
      <div class="filters-bar">
        <label class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="supplierSearch" placeholder="Search suppliers…">
        </label>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Supplier</th>
                <th>Contact Person</th>
                <th>Phone</th>
                <th>Products Supplied</th>
                <th>Status</th>
                <th style="text-align:right;">Actions</th>
              </tr>
            </thead>
            <tbody id="suppliersTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Add supplier modal -->
<div class="modal" id="supplierModal">
  <div class="modal-backdrop" data-close-panel></div>
  <div class="modal-box">
    <div class="modal-header">
      <h3>Add Supplier</h3>
      <button class="close-btn" data-close-panel>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="field"><label for="sName">Company Name</label><input class="input" type="text" id="sName" placeholder="e.g. Nutriwell Distributors"></div>
      <div class="field"><label for="sContact">Contact Person</label><input class="input" type="text" id="sContact" placeholder="e.g. Vivek Singh"></div>
      <div class="input-row">
        <div class="field"><label for="sPhone">Phone</label><input class="input" type="tel" id="sPhone" placeholder="+91 90000 00000"></div>
        <div class="field"><label for="sEmail">Email</label><input class="input" type="email" id="sEmail" placeholder="contact@supplier.com"></div>
      </div>
      <div class="field" style="margin-bottom:0;"><label for="sAddress">Address</label><textarea class="input" id="sAddress" placeholder="Warehouse / office address"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close-panel>Cancel</button>
      <button class="btn btn-primary" id="saveSupplierBtn">Save Supplier</button>
    </div>
  </div>
</div>

<script src="assets/js/app.js"></script>
<script>
  let suppliers = [
    { id: 1, name: 'Nutriwell Distributors', contact: 'Vivek Singh', phone: '+91 90000 11111', products: 86, status: 'active' },
    { id: 2, name: 'Fresh Farms Co.', contact: 'Meera Joshi', phone: '+91 90000 22222', products: 54, status: 'active' },
    { id: 3, name: 'Global Roasters Ltd.', contact: 'Aditya Rao', phone: '+91 90000 33333', products: 32, status: 'active' },
    { id: 4, name: 'Golden Grain Traders', contact: 'Ritu Kapoor', phone: '+91 90000 44444', products: 71, status: 'inactive' },
    { id: 5, name: 'Coastal Dairy Supplies', contact: 'Farhan Ali', phone: '+91 90000 55555', products: 45, status: 'active' },
    { id: 6, name: 'Sunrise Bakery Ingredients', contact: 'Neha Gupta', phone: '+91 90000 66666', products: 28, status: 'active' },
  ];

  const tbody = document.getElementById('suppliersTableBody');
  const searchInput = document.getElementById('supplierSearch');

  function render() {
    const q = searchInput.value.trim().toLowerCase();
    const filtered = suppliers.filter((s) => !q || s.name.toLowerCase().includes(q) || s.contact.toLowerCase().includes(q));

    tbody.innerHTML = filtered.map((s) => `
      <tr>
        <td>
          <div class="cell-with-media">
            <div class="table-thumb" style="display:flex;align-items:center;justify-content:center;background:var(--color-primary-light);color:var(--color-primary);font-weight:700;">${s.name.charAt(0)}</div>
            <span class="cell-primary">${s.name}</span>
          </div>
        </td>
        <td>${s.contact}</td>
        <td class="cell-muted">${s.phone}</td>
        <td>${s.products} products</td>
        <td><span class="badge ${s.status === 'active' ? 'badge-success' : 'badge-neutral'}">${s.status === 'active' ? 'Active' : 'Inactive'}</span></td>
        <td>
          <div class="row-actions" style="justify-content:flex-end;">
            <button class="btn btn-ghost btn-icon" title="Edit" data-edit="${s.id}">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            </button>
            <button class="btn btn-ghost btn-icon" title="Delete" data-delete="${s.id}">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
            </button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  searchInput.addEventListener('input', render);

  tbody.addEventListener('click', (e) => {
    const deleteId = e.target.closest('[data-delete]')?.getAttribute('data-delete');
    if (deleteId && confirm('Remove this supplier?')) {
      suppliers = suppliers.filter((s) => s.id != deleteId);
      render();
      BrandVista.showToast('Supplier removed.', 'success');
    }
  });

  document.getElementById('addSupplierBtn').addEventListener('click', () => document.getElementById('supplierModal').classList.add('open'));
  document.querySelectorAll('[data-close-panel]').forEach((b) => b.addEventListener('click', () => document.getElementById('supplierModal').classList.remove('open')));

  document.getElementById('saveSupplierBtn').addEventListener('click', () => {
    const name = document.getElementById('sName').value.trim();
    if (!name) { BrandVista.showToast('Company name is required.', 'error'); return; }
    suppliers.unshift({ id: Date.now(), name, contact: document.getElementById('sContact').value || '—', phone: document.getElementById('sPhone').value || '—', products: 0, status: 'active' });
    document.getElementById('supplierModal').classList.remove('open');
    render();
    BrandVista.showToast('Supplier added successfully.', 'success');
  });

  render();
</script>
<script type="module">
  import { protectPage } from './assets/js/neon-auth.js';
  protectPage();
</script>
</body>
</html>
